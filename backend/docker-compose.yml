volumes:
  redis_data: 
  mysql_data:
services:
  redis:
    container_name: local_redis
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379
    command: redis-server --requirepass "" --loglevel warning --maxmemory 256mb --maxmemory-policy volatile-lfu
  mysql:
    image: mysql:8
    container_name: local_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234asdw
      TZ: Asia/Shanghai
    command: 
      - --max-allowed-packet=32M
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - 3306:3306